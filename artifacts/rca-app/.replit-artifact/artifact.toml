kind = "web"
previewPath = "/"
title = "AI Root Cause Analyzer"
version = "1.0.0"
id = "artifacts/rca-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26052

[services.development]
run = "pnpm --filter @workspace/rca-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rca-app", "run", "build" ]
publicDir = "artifacts/rca-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26052"
BASE_PATH = "/"
